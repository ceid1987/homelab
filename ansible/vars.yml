---
# Non-secret variavles

target_user: carl

#   k3s:      k3s --version
#   kubeseal: kubeseal --version
k3s_version: "v1.35.5+k3s1"
kubeseal_version: "0.37.0"

# Github
repo_url: "https://github.com/ceid1987/homelab.git"
repo_branch: "main"

# Cluster
kubeconfig: "/etc/rancher/k3s/k3s.yaml"
namespaces:
  - argocd
  - apps
  - monitoring

# Upstream manifests
argocd_manifest: "https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml"
sealed_secrets_manifest: "https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/controller.yaml"

# Hetzner Object Storage
hetzner_s3_endpoint: "nbg1.your-objectstorage.com"
hetzner_s3_region: "nbg1"
hetzner_bucket: "homelab-carleid"
