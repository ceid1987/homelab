apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ceid1987/homelab.git
    targetRevision: HEAD
    path: k8s/apps/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
  - kind: ConfigMap
    name: cloudflared
    namespace: apps
    jsonPointers:
    - /data/config.yaml