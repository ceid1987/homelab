apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
  namespace: apps
data:
  config.yaml: |
    tunnel: vps-cluster-tunnel
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
    - hostname: grafana.carleid.dev
      service: http://grafana.monitoring.svc.cluster.local:80
    - service: http_status:404
