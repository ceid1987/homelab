server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback. The entry HTML must never be cached, otherwise browsers /
    # Cloudflare keep serving an old index.html that references stale (removed)
    # hashed assets after a deploy.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Proxy API calls to the in-cluster homelab-api service (kept private; not
    # publicly exposed). Same-namespace service, so the short name resolves.
    location /api/ {
        proxy_pass http://homelab-api.homelab-web.svc.cluster.local:80;
    }

    # cache hashed build assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
